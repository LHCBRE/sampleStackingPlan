<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Stacking Plan</title>
  <style>
    body { font-family: Arial; margin: 0; padding: 20px; }
    .layout { display: grid; grid-template-columns: 150px 1fr; gap: 20px; }
    .floor { padding: 10px; margin-bottom: 6px; background: #ddd; cursor: pointer; text-align: center; border-radius: 8px; }
    .floor.active { background: #0078ff; color: white; }
    .card { padding: 12px; border: 1px solid #ccc; margin-bottom: 8px; border-radius: 8px; cursor: pointer; }
    .modal {
      position: fixed; inset: 0; background: rgba(0,0,0,0.6);
      display: none; align-items: center; justify-content: center;
    }
    .modal-content {
      background: white; padding: 20px; border-radius: 12px; max-width: 500px; width: 100%;
    }
    img { width: 100%; border-radius: 8px; }
    button { margin: 5px; }
  </style>
</head>
<body>

<div class="layout">
  <div id="floors"></div>
  <div>
    <h2>Suites</h2>
    <div id="suites">Select a floor</div>
  </div>
</div>

<div id="modal" class="modal">
  <div class="modal-content">
    <h3 id="modalTitle"></h3>
    <div id="modalRSF"></div>
    <div>
      <button onclick="prevImage()">◀</button>
      <button onclick="nextImage()">▶</button>
    </div>
    <img id="modalImg" />
    <pre id="modalNotes"></pre>
    <a id="modalPDF" target="_blank">Download PDF</a>
    <br>
    <button onclick="closeModal()">Close</button>
  </div>
</div>

<script>

let data = [];

fetch("data.json")
  .then(res => res.json())
  .then(json => {
    data = json;
  });


let selectedSuite = null;
let imageIndex = 0;

const floorsEl = document.getElementById("floors");
const suitesEl = document.getElementById("suites");

const floors = Array.from({length:12}, (_,i)=>12-i);

floors.forEach(f => {
  const div = document.createElement("div");
  div.className = "floor";
  div.innerText = "Floor " + f;
  div.onclick = () => selectFloor(f);
  floorsEl.appendChild(div);
});


function selectFloor(floor) {
  
if (!data.length) {
  suitesEl.innerHTML = "Loading...";
  return;
}


  document.querySelectorAll('.floor').forEach(el=>el.classList.remove("active"));
  floorsEl.children[12-floor].classList.add("active");

  const suites = data.filter(s=>s.floor===floor);
  if (!suites.length) {
    suitesEl.innerHTML = "No availability";
    return;
  }


  suitesEl.innerHTML = "";
  suites.forEach(s=>{
    const div = document.createElement("div");
    div.className = "card";
    div.innerHTML = `<strong>Suite ${s.suite}</strong><br>${s.rsf.toLocaleString()} RSF`;
    div.onclick = () => openModal(s);
    suitesEl.appendChild(div);
  });
}

function openModal(suite) {
  selectedSuite = suite;
  imageIndex = 0;

  document.getElementById("modalTitle").innerText = "Suite " + suite.suite;
  document.getElementById("modalRSF").innerText = suite.rsf.toLocaleString() + " RSF";
  document.getElementById("modalImg").src = suite.images[0];
  document.getElementById("modalNotes").innerText = suite.notes;
  document.getElementById("modalPDF").href = suite.pdf;

  document.getElementById("modal").style.display = "flex";
}

function closeModal() {
  document.getElementById("modal").style.display = "none";
}

function nextImage() {
  if (!selectedSuite) return;
  imageIndex = (imageIndex + 1) % selectedSuite.images.length;
  document.getElementById("modalImg").src = selectedSuite.images[imageIndex];
}

function prevImage() {
  if (!selectedSuite) return;
  imageIndex = (imageIndex - 1 + selectedSuite.images.length) % selectedSuite.images.length;
  document.getElementById("modalImg").src = selectedSuite.images[imageIndex];
}
</script>

</body>
</html>
